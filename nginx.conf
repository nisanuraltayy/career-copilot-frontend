server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Statik varlıklar için uzun önbellek.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA: bilinmeyen yollar index.html'e düşer (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api -> backend (aynı origin, CORS gerekmez). Sondaki / ile /api öneki
    # backend'e iletilmeden önce soyulur: /api/cv-gecmis -> /cv-gecmis.
    location /api/ {
        proxy_pass http://app:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 12m;  # CV yükleme limitiyle uyumlu
    }
}
